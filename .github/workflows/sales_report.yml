name: 매출 리포트 메일 발송 (일시 정지)

# 자동 cron 실행은 일시 중단됨 (matetech API 전환 작업 진행 중).
# 다시 켜려면 아래 schedule 블록의 주석을 해제하세요.
on:
  # schedule:
  #   # 일간 리포트: 매일 KST 08:30 (UTC 23:30 전날) — 30분 버퍼
  #   - cron: "30 23 * * *"
  #   # 주간 리포트: 매주 월요일 KST 08:30 (UTC 23:30 일요일)
  #   - cron: "30 23 * * 0"
  workflow_dispatch:
    inputs:
      report_type:
        description: "리포트 타입 (daily 또는 weekly)"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-sales-report:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install playwright openpyxl anthropic
          playwright install chromium
          playwright install-deps chromium

      - name: 리포트 타입 결정
        id: rt
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            echo "type=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "type=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: 매출 리포트 메일 발송
        env:
          MATETECH_USERNAME: ${{ secrets.MATETECH_USERNAME }}
          MATETECH_PASSWORD: ${{ secrets.MATETECH_PASSWORD }}
          MATETECH_BRAND: ${{ secrets.MATETECH_BRAND }}
          MATETECH_USERNAME_2: ${{ secrets.MATETECH_USERNAME_2 }}
          MATETECH_PASSWORD_2: ${{ secrets.MATETECH_PASSWORD_2 }}
          MATETECH_BRAND_2: ${{ secrets.MATETECH_BRAND_2 }}
          MATETECH_USERNAME_3: ${{ secrets.MATETECH_USERNAME_3 }}
          MATETECH_PASSWORD_3: ${{ secrets.MATETECH_PASSWORD_3 }}
          MATETECH_BRAND_3: ${{ secrets.MATETECH_BRAND_3 }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_TYPE: ${{ steps.rt.outputs.type }}
        run: python sales_report.py
