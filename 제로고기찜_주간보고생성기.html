<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>제로고기찜 주간보고 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:-apple-system,'Malgun Gothic',sans-serif;padding:12px;}
.inp-panel{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px;margin-bottom:12px;}
.inp-title{font-size:13px;font-weight:700;color:#1a2235;margin-bottom:10px;}
.inp-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
label{font-size:10px;font-weight:600;color:#64748b;}
textarea{border:1px solid #e2e8f0;border-radius:6px;padding:8px;font-size:10px;color:#1a2235;outline:none;width:100%;resize:vertical;font-family:monospace;line-height:1.6;}
textarea:focus{border-color:#4B7BE8;}
.hint{font-size:9.5px;color:#94a3b8;margin-top:4px;line-height:1.6;}
.hint code{background:#f1f5f9;padding:1px 4px;border-radius:3px;color:#475569;}
.run-btn{width:100%;padding:10px;background:#4B7BE8;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px;}
.run-btn:hover{background:#3566d0;}
.err{background:#fff1f1;border:1px solid #fca5a5;border-radius:6px;padding:8px 12px;font-size:11px;color:#dc2626;margin-bottom:10px;display:none;}
.dash{display:none;}
.dash.on{display:block;}
.page-header{background:#1a2235;border-radius:8px 8px 0 0;padding:12px 16px 10px;}
.page-header-top{display:flex;align-items:center;justify-content:space-between;}
.brand-badge{display:flex;align-items:center;gap:8px;}
.brand-icon{width:28px;height:28px;background:linear-gradient(135deg,#4B7BE8,#2d5abf);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.brand-name{font-size:15px;font-weight:700;color:#fff;}
.brand-sub{font-size:10px;color:#94a3b8;margin-top:1px;}
.week-badge{display:flex;gap:6px;align-items:center;}
.wbadge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;}
.wbadge-prev{background:rgba(255,255,255,.15);color:#cbd5e1;}
.wbadge-arrow{color:#64748b;font-size:11px;}
.wbadge-curr{background:#4B7BE8;color:#fff;}
.tab-bar{display:flex;align-items:stretch;border-bottom:2px solid #e2e8f0;background:#fff;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.tab{flex:1;padding:8px 0;text-align:center;font-size:11px;font-weight:600;color:#8896b0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.on{color:#4B7BE8;border-bottom:2px solid #4B7BE8;background:#f8faff;}
.edit-btn{display:flex;align-items:center;padding:0 12px;font-size:10px;font-weight:600;color:#475569;background:#f1f5f9;border:none;border-left:1px solid #e2e8f0;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.edit-btn:hover{background:#e2e8f0;}
.page{display:none;background:#f0f4f8;padding:10px;border-radius:0 0 8px 8px;}
.page.on{display:block;}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e8edf5;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.kpi{padding:8px 10px;}
.kl{font-size:9.5px;color:#8896b0;margin-bottom:2px;}
.kv{font-size:15px;font-weight:700;color:#1a2235;line-height:1.1;}
.ks{font-size:9px;color:#a0aec0;margin-top:2px;}
.sec{margin-bottom:6px;padding:8px 10px;}
.sec-tit{font-size:11px;font-weight:700;color:#1a2235;margin-bottom:7px;}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:10.5px;}
.cmp-tbl thead th{color:#8896b0;font-weight:600;padding:4px 8px;border-bottom:1px solid #e8edf5;text-align:right;white-space:nowrap;}
.cmp-tbl thead th:first-child{text-align:left;}
.cmp-tbl tbody td{padding:4px 8px;text-align:right;border-bottom:1px solid #f4f6fa;color:#374151;}
.cmp-tbl tbody td:first-child{text-align:left;font-weight:600;color:#1a2235;}
.cmp-tbl .total-row td{background:#f8fafc;font-weight:700;border-top:1px solid #dde4ef;border-bottom:none;}
.donut-summary{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:6px;padding:6px 8px;background:#f8fafc;border-radius:6px;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.donut-lbl{font-size:9px;font-weight:600;color:#64748b;}
.donut-canvas-wrap{position:relative;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.donut-center-bm{font-size:9px;font-weight:700;color:#4B7BE8;line-height:1.2;}
.donut-center-cp{font-size:9px;font-weight:700;color:#E86035;line-height:1.2;}
.donut-arrow{font-size:13px;color:#94a3b8;align-self:center;margin-top:8px;}
.donut-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.donut-card{background:#fff;border-radius:5px;padding:4px 4px;border:1px solid #dde3ef;box-shadow:0 1px 3px rgba(74,107,200,.08);}
.donut-card-nm{font-size:7.5px;font-weight:700;color:#1a2235;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.donut-card-charts{display:flex;gap:2px;align-items:flex-start;justify-content:center;}
.donut-card-unit{display:flex;flex-direction:column;align-items:center;gap:1px;}
.donut-card-wk{font-size:6.5px;font-weight:600;padding:1px 2px;border-radius:2px;white-space:nowrap;}
.donut-card-vals{font-size:6.5px;color:#8896b0;text-align:center;line-height:1.3;}
.donut-chg{font-size:7.5px;font-weight:700;text-align:right;margin-top:2px;}
.ad-tbl{width:100%;border-collapse:collapse;font-size:10px;}
.ad-tbl th{color:#8896b0;font-weight:600;padding:4px 7px;border-bottom:1px solid #e8edf5;text-align:center;white-space:nowrap;}
.ad-tbl th:first-child{text-align:left;}
.ad-tbl td{padding:4px 7px;border-bottom:1px solid #f4f6fa;text-align:center;color:#374151;}
.ad-tbl td:first-child{text-align:left;font-weight:600;color:#1a2235;}
.chg{color:#dc2626;font-weight:700;}
.same-txt{color:#c5cdd8;font-size:8.5px;}
.bup{display:inline-block;font-size:9.5px;padding:1px 4px;border-radius:3px;background:#fff1f1;color:#dc2626;font-weight:700;}
.bdn{display:inline-block;font-size:9.5px;padding:1px 4px;border-radius:3px;background:#eff6ff;color:#2563eb;font-weight:700;}
.report{background:#fff;border-radius:8px;border:1px solid #e8edf5;overflow:hidden;margin-top:8px;}
.rp-hd{background:#1a2235;padding:10px 14px;}
.rp-hd-tit{font-size:12px;font-weight:700;color:#fff;margin-bottom:1px;}
.rp-hd-sub{font-size:10px;color:#8896b0;}
.rp-body{padding:12px 14px;}
.sb{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f4f8;}
.sb:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.sb-nm{font-size:11px;font-weight:700;color:#1a2235;margin-bottom:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.rtag{font-size:8.5px;padding:2px 6px;border-radius:8px;font-weight:600;}
.tg{background:#dcfce7;color:#15803d;}.tw{background:#fee2e2;color:#b91c1c;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px;}
.m{background:#f8fafc;border-radius:5px;padding:5px 8px;}
.ml{font-size:8.5px;color:#8896b0;margin-bottom:1px;}
.mv{font-size:12px;font-weight:700;color:#1a2235;}
.sb-txt{font-size:10.5px;color:#374151;line-height:1.7;border-left:2px solid #e2e8f0;padding-left:9px;}
.sb-txt strong{color:#1a2235;}
.act{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:3px;background:#fffbeb;color:#92400e;border:1px solid #fde68a;font-weight:600;margin-top:4px;}
</style>
</head>
<body>

<div class="inp-panel" id="inputPanel">
  <div class="inp-title">🥩 제로고기찜 주간보고 생성기</div>
  <div class="inp-group">
    <label>데이터 붙여넣기 (엑셀에서 전체 복사 → 여기에 붙여넣기)</label>
    <textarea id="tData" rows="22" placeholder="5월4주차	산들그린_도곡점	5,310,800	3,141,000	2,169,800	810	2,000	15%	2,000
	위드저니파트너스_대구봉산점	1,088,300	740,600	347,700	510	2,000	19%	1,000
	산들그린_인천간석점	735,400	478,100	257,300	700	2,000	10%	2,000
	위드저니파트너스_봉천점	4,234,700	2,093,900	2,140,800	690	3,000	19%	0
...
5월5주차	산들그린_도곡점	3,736,300	2,421,500	1,314,800	450	2,000	12%	1,000
	위드저니파트너스_대구봉산점	845,800	338,900	506,900	350	2,000	19%	1,000
..."></textarea>
    <div class="hint">
      형식: 전주 블록(첫 행에 주차명+첫 매장, 이후 행에 나머지 매장) → 금주 블록 동일<br>
      열 순서: <code>주차명(첫 행만)</code> <code>매장명</code> <code>총매출</code> <code>배민매출</code> <code>쿠팡매출</code> <code>우가클릭비</code> <code>배민즉할</code> <code>쿠팡광고율%</code> <code>쿠팡즉할</code>
    </div>
  </div>
  <div id="errMsg" class="err"></div>
  <button class="run-btn" onclick="runAnalyze()">📊 보고서 생성</button>
</div>

<div class="dash" id="dash">
  <div class="page-header">
    <div class="page-header-top">
      <div class="brand-badge">
        <div class="brand-icon">🥩</div>
        <div>
          <div class="brand-name" id="hTitle">제로고기찜 주간매출분석</div>
          <div class="brand-sub" id="hSub"></div>
        </div>
      </div>
      <div class="week-badge">
        <span class="wbadge wbadge-prev" id="hW1"></span>
        <span class="wbadge-arrow">→</span>
        <span class="wbadge wbadge-curr" id="hW2"></span>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab on" onclick="showTab(0)">📊 매출분석</div>
    <div class="tab" onclick="showTab(1)">📋 분석보고용</div>
    <button class="edit-btn" onclick="editMode()">✏ 수정</button>
  </div>
  <div class="page on" id="p0"><div id="b0"></div></div>
  <div class="page" id="p1"><div id="b1"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let D=null,chartInst=[];

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('on',i===n));
}
function editMode(){
  chartInst.forEach(c=>{try{c.destroy();}catch(e){}});
  chartInst=[];
  document.getElementById('inputPanel').style.display='';
  document.getElementById('dash').classList.remove('on');
}
function showErr(msg){const el=document.getElementById('errMsg');el.textContent=msg;el.style.display='block';}
function toNum(v){return parseFloat(String(v).replace(/,/g,'').replace(/%/g,'').trim())||0;}

// 파서: 행=매장, col0=주차명(첫 행만), col1=매장명, col2~8=지표
// 전주블록과 금주블록을 col0의 주차명으로 구분
function parseData(text){
  const lines=text.trim().split('\n').map(l=>l.split('\t'));

  const S=[],W1=[],W2=[],AD1=[],AD2=[];
  let w1L='',w2L='';
  let weekBlocks=[];  // [{label, rows:[{name,vals}]}]

  let curBlock=null;
  for(const line of lines){
    const col0=(line[0]||'').trim();
    const col1=(line[1]||'').trim();
    // col0에 값 있으면 새 주차 블록 시작
    if(col0){
      if(curBlock) weekBlocks.push(curBlock);
      curBlock={label:col0,rows:[]};
      if(col1) curBlock.rows.push({name:col1,vals:line.slice(2)});
    } else if(col1&&curBlock){
      curBlock.rows.push({name:col1,vals:line.slice(2)});
    }
  }
  if(curBlock) weekBlocks.push(curBlock);

  if(weekBlocks.length<2) return {err:'전주/금주 블록 2개를 찾을 수 없습니다. 주차명이 첫 열에 있는지 확인해주세요.'};

  w1L=weekBlocks[0].label; w2L=weekBlocks[1].label;
  const b1=weekBlocks[0].rows, b2=weekBlocks[1].rows;
  if(b1.length===0) return {err:'전주 매장 데이터가 없습니다.'};
  if(b2.length===0) return {err:'금주 매장 데이터가 없습니다.'};

  // 매장명 기준으로 매칭 (순서가 같으면 그냥 순서대로)
  const names=b1.map(r=>r.name);
  for(let i=0;i<b1.length;i++){
    const r1=b1[i], r2=b2[i]||b2.find(r=>r.name===r1.name)||b2[0];
    S.push(r1.name);
    // col: 총매출=0, 배민=1, 쿠팡=2, 클릭비=3, 배민즉할=4, 쿠팡광고율=5, 쿠팡즉할=6
    W1.push([toNum(r1.vals[0]),toNum(r1.vals[1]),toNum(r1.vals[2])]);
    W2.push([toNum(r2.vals[0]),toNum(r2.vals[1]),toNum(r2.vals[2])]);
    // 광고 설정 (있으면)
    AD1.push([toNum(r1.vals[3]),toNum(r1.vals[4]),toNum(r1.vals[5]),toNum(r1.vals[6])]);
    AD2.push([toNum(r2.vals[3]),toNum(r2.vals[4]),toNum(r2.vals[5]),toNum(r2.vals[6])]);
  }

  const hasAd=AD1.some(a=>a.some(v=>v>0));
  return {S,W1,W2,AD1,AD2,w1L,w2L,hasAd};
}

function runAnalyze(){
  document.getElementById('errMsg').style.display='none';
  const txt=document.getElementById('tData').value.trim();
  if(!txt){showErr('데이터를 붙여넣어 주세요.');return;}
  const result=parseData(txt);
  if(result.err){showErr(result.err);return;}
  D=result;
  document.getElementById('hW1').textContent=D.w1L;
  document.getElementById('hW2').textContent=D.w2L;
  document.getElementById('hSub').textContent=`${D.S.length}개 매장`;
  renderDash();
  document.getElementById('inputPanel').style.display='none';
  document.getElementById('dash').classList.add('on');
  showTab(0);
}

const fm=v=>Math.round(v).toLocaleString('ko-KR')+'원';
const fp=g=>g>=0?`<span class="bup">▲${(g*100).toFixed(1)}%</span>`:`<span class="bdn">▼${(Math.abs(g)*100).toFixed(1)}%</span>`;

function renderDash(){
  const {S,W1,W2,AD1,AD2,w1L,w2L,hasAd}=D;
  const TW1=W1.reduce((s,d)=>s+d[0],0),TW2=W2.reduce((s,d)=>s+d[0],0),tgr=(TW2-TW1)/TW1;
  const TB1=W1.reduce((s,d)=>s+d[1],0),TB2=W2.reduce((s,d)=>s+d[1],0);
  const TC1=W1.reduce((s,d)=>s+d[2],0),TC2=W2.reduce((s,d)=>s+d[2],0);
  const upN=S.filter((_,i)=>W2[i][0]>W1[i][0]).length,dnN=S.filter((_,i)=>W2[i][0]<W1[i][0]).length;
  const ord=[...S.keys()].sort((a,b)=>W2[b][0]-W2[a][0]);

  function cmpTable(){
    let h=`<table class="cmp-tbl"><thead><tr><th>매장</th><th style="color:#4a5568;">${w1L}</th><th style="color:#1d4ed8;">${w2L}</th><th>증감액</th><th>전주대비</th></tr></thead><tbody>`;
    ord.forEach(i=>{
      const diff=W2[i][0]-W1[i][0],g=diff/W1[i][0];
      h+=`<tr><td>${S[i]}</td><td style="color:#4a5568;">${fm(W1[i][0])}</td><td style="font-weight:700;">${fm(W2[i][0])}</td><td style="color:${diff>=0?'#dc2626':'#2563eb'};font-weight:600;">${diff>=0?'+':''}${Math.round(diff/10000).toLocaleString('ko-KR')}만</td><td>${fp(g)}</td></tr>`;
    });
    const tdiff=TW2-TW1;
    h+=`<tr class="total-row"><td>전체</td><td>${fm(TW1)}</td><td>${fm(TW2)}</td><td style="color:${tdiff>=0?'#dc2626':'#2563eb'};font-weight:700;">${tdiff>=0?'+':''}${Math.round(tdiff/10000).toLocaleString('ko-KR')}만</td><td>${fp(tgr)}</td></tr></tbody></table>`;
    return h;
  }

  function shareSection(){
    const gb1=Math.round(TB1/TW1*100),gc1=100-gb1,gb2=Math.round(TB2/TW2*100),gc2=100-gb2;
    // 전체 합산 도넛 2개
    let h=`<div class="donut-summary">
      <div class="donut-wrap">
        <div class="donut-lbl">${w1L} 전체</div>
        <div class="donut-canvas-wrap" style="width:58px;height:58px;">
          <canvas id="dt_total_1" width="58" height="58"></canvas>
          <div class="donut-center"><span class="donut-center-bm">${gb1}%</span><span class="donut-center-cp">${gc1}%</span></div>
        </div>
      </div>
      <div class="donut-arrow">→</div>
      <div class="donut-wrap">
        <div class="donut-lbl">${w2L} 전체</div>
        <div class="donut-canvas-wrap" style="width:58px;height:58px;">
          <canvas id="dt_total_2" width="58" height="58"></canvas>
          <div class="donut-center"><span class="donut-center-bm">${gb2}%</span><span class="donut-center-cp">${gc2}%</span></div>
        </div>
      </div>
      <div style="font-size:9px;color:#8896b0;line-height:1.6;margin-left:6px;">
        <div><span style="color:#4B7BE8;font-weight:600;">■</span> 배민</div>
        <div><span style="color:#E86035;font-weight:600;">■</span> 쿠팡이츠</div>
        <div style="margin-top:4px;font-size:8.5px;">쿠팡 비중 변화</div>
        <div style="font-weight:700;font-size:10px;color:${gc2>gc1?'#dc2626':'#2563eb'};">${gc2>gc1?'+':''}${gc2-gc1}%p</div>
      </div>
    </div>`;
    // 매장별 도넛 그리드
    h+='<div class="donut-grid">';
    ord.forEach(i=>{
      const t1=W1[i][0],t2=W2[i][0];
      const bp1=t1>0?Math.round(W1[i][1]/t1*100):0,cp1=100-bp1;
      const bp2=t2>0?Math.round(W2[i][1]/t2*100):0,cp2=100-bp2;
      const dcp=cp2-cp1;
      h+=`<div class="donut-card">
        <div class="donut-card-nm">${S[i]}</div>
        <div class="donut-card-charts">
          <div class="donut-card-unit">
            <span class="donut-card-wk tag-prev">${w1L}</span>
            <div class="donut-canvas-wrap" style="width:38px;height:38px;">
              <canvas id="dt_${i}_1" width="38" height="38"></canvas>
              <div class="donut-center"><span style="font-size:7px;font-weight:700;color:#4B7BE8;">${bp1}%</span></div>
            </div>
            <div class="donut-card-vals"><span style="color:#4B7BE8;">${bp1}%</span>/<span style="color:#E86035;">${cp1}%</span></div>
          </div>
          <div class="donut-card-unit">
            <span class="donut-card-wk tag-curr">${w2L}</span>
            <div class="donut-canvas-wrap" style="width:38px;height:38px;">
              <canvas id="dt_${i}_2" width="38" height="38"></canvas>
              <div class="donut-center"><span style="font-size:7px;font-weight:700;color:#4B7BE8;">${bp2}%</span></div>
            </div>
            <div class="donut-card-vals"><span style="color:#4B7BE8;">${bp2}%</span>/<span style="color:#E86035;">${cp2}%</span></div>
          </div>
        </div>
        <div class="donut-chg" style="color:${dcp>0?'#dc2626':'#2563eb'};">쿠팡 ${dcp>=0?'+':''}${dcp}%p</div>
      </div>`;
    });
    h+='</div>';
    return h;
  }

  function adTable(){
    const fmt=(v,k)=>k===2?v+'%':v>0?v.toLocaleString()+'원':'0원';
    let h=`<table class="ad-tbl"><thead><tr><th>매장</th><th>우가클릭비<br><small style="font-weight:400;">${w1L}→${w2L}</small></th><th>배민즉시할인<br><small style="font-weight:400;">${w1L}→${w2L}</small></th><th>쿠팡광고율<br><small style="font-weight:400;">${w1L}→${w2L}</small></th><th>쿠팡즉시할인<br><small style="font-weight:400;">${w1L}→${w2L}</small></th></tr></thead><tbody>`;
    ord.forEach(i=>{
      h+=`<tr><td>${S[i]}</td>`;
      [0,1,2,3].forEach(k=>{
        const v1=AD1[i][k],v2=AD2[i][k],c=v1!==v2;
        h+=`<td>${fmt(v1,k)}${c?`<br><span class="chg">→${fmt(v2,k)}</span>`:`<br><span class="same-txt">동일</span>`}</td>`;
      });
      h+='</tr>';
    });
    return h+'</tbody></table>';
  }

  function buildMain(){
    let h=`
    <div class="kpis">
      <div class="kpi card"><div class="kl">${w1L} 합계</div><div class="kv">${fm(TW1)}</div><div class="ks">배민 ${fm(TB1)} / 쿠팡 ${fm(TC1)}</div></div>
      <div class="kpi card"><div class="kl">${w2L} 합계</div><div class="kv">${fm(TW2)}</div><div class="ks">배민 ${fm(TB2)} / 쿠팡 ${fm(TC2)}</div></div>
      <div class="kpi card"><div class="kl">전주대비</div><div class="kv">${fp(tgr)}</div><div class="ks">${tgr>=0?'+':''}${Math.round((TW2-TW1)/10000).toLocaleString('ko-KR')}만원</div></div>
      <div class="kpi card"><div class="kl">매장 현황</div><div class="kv" style="font-size:13px;">상승 ${upN} / 하락 ${dnN}</div><div class="ks">전체 ${S.length}개 매장</div></div>
    </div>
    <div class="card sec"><div class="sec-tit">① ${w1L} vs ${w2L} 매출 비교</div>${cmpTable()}</div>
    <div class="card sec" style="margin-top:8px;">
      <div class="sec-tit">② 배민 / 쿠팡이츠 점유율 비교</div>
      ${shareSection()}
    </div>`;
    if(hasAd){
      h+=`<div class="card sec" style="margin-top:8px;"><div class="sec-tit">③ 광고 설정 비교 <span style="font-size:9px;color:#8896b0;font-weight:400;">${w1L}→${w2L} · 빨강=변경</span></div><div style="overflow-x:auto;">${adTable()}</div></div>`;
    }
    return h;
  }

  function buildReport(){
    const topStores=ord.slice(0,Math.min(3,ord.length));
    return`<div class="report">
      <div class="rp-hd"><div class="rp-hd-tit">주간 분석 보고서</div><div class="rp-hd-sub">${w1L} vs ${w2L} · 제로고기찜 ${S.length}개 매장</div></div>
      <div class="rp-body">
        <div class="sb">
          <div class="sb-nm">전체 총평 <span class="rtag ${tgr>=0?'tg':'tw'}">${tgr>=0?'▲':'▼'}${(Math.abs(tgr)*100).toFixed(1)}%</span></div>
          <div class="metrics">
            <div class="m"><div class="ml">${w1L}</div><div class="mv">${fm(TW1)}</div></div>
            <div class="m"><div class="ml">${w2L}</div><div class="mv">${fm(TW2)}</div></div>
            <div class="m"><div class="ml">상승</div><div class="mv" style="color:#dc2626;">${upN}개</div></div>
            <div class="m"><div class="ml">하락</div><div class="mv" style="color:#2563eb;">${dnN}개</div></div>
          </div>
          <div class="sb-txt">${w2L} <strong>${fm(TW2)}</strong>으로 전주 대비 <strong>${Math.abs(Math.round((TW2-TW1)/10000)).toLocaleString('ko-KR')}만원(${(Math.abs(tgr)*100).toFixed(1)}%) ${tgr>=0?'증가':'감소'}</strong>했습니다. 쿠팡이츠 비중이 ${Math.round(TC1/TW1*100)}%→${Math.round(TC2/TW2*100)}%로 변화했습니다.</div>
        </div>
        ${topStores.map(i=>{
          const g=(W2[i][0]-W1[i][0])/W1[i][0];
          return`<div class="sb">
            <div class="sb-nm">${S[i]} <span class="rtag ${g>=0?'tg':'tw'}">${g>=0?'▲':'▼'}${(Math.abs(g)*100).toFixed(1)}%</span></div>
            <div class="metrics">
              <div class="m"><div class="ml">${w1L}</div><div class="mv">${fm(W1[i][0])}</div></div>
              <div class="m"><div class="ml">${w2L}</div><div class="mv" style="color:${g>=0?'#16a34a':'#dc2626'};">${fm(W2[i][0])}</div></div>
              <div class="m"><div class="ml">배민비중</div><div class="mv" style="font-size:11px;">${Math.round(W1[i][1]/(W1[i][0]||1)*100)}%→${Math.round(W2[i][1]/(W2[i][0]||1)*100)}%</div></div>
              <div class="m"><div class="ml">쿠팡비중</div><div class="mv" style="font-size:11px;">${Math.round(W1[i][2]/(W1[i][0]||1)*100)}%→${Math.round(W2[i][2]/(W2[i][0]||1)*100)}%</div></div>
            </div>
            <div class="sb-txt">${w2L} ${fm(W2[i][0])}으로 전주 대비 ${g>=0?'<span style="color:#dc2626;font-weight:700;">+'+Math.round((W2[i][0]-W1[i][0])/10000).toLocaleString('ko-KR')+'만 증가':'<span style="color:#2563eb;font-weight:700;">'+Math.round((W2[i][0]-W1[i][0])/10000).toLocaleString('ko-KR')+'만 감소'}</span>했습니다.<br><span class="act">▶ 세팅 모니터링 및 매장 소통 지속</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('b0').innerHTML=buildMain();
  document.getElementById('b1').innerHTML=buildMain()+buildReport();
  initDonuts();
}

function mkDonut(id,bm,cp){
  const el=document.getElementById(id);
  if(!el||el._ok)return; el._ok=true;
  const c=new Chart(el,{
    type:'doughnut',
    data:{datasets:[{data:[bm,cp],backgroundColor:['#4B7BE8','#E86035'],borderWidth:0,hoverOffset:0}]},
    options:{responsive:false,cutout:'52%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:400}}
  });
  chartInst.push(c);
}

function initDonuts(){
  const {S,W1,W2,w1L,w2L}=D;
  const TW1=W1.reduce((s,d)=>s+d[0],0),TW2=W2.reduce((s,d)=>s+d[0],0);
  const TB1=W1.reduce((s,d)=>s+d[1],0),TB2=W2.reduce((s,d)=>s+d[1],0);
  const ord=[...S.keys()].sort((a,b)=>W2[b][0]-W2[a][0]);
  setTimeout(()=>{
    const gb1=Math.round(TB1/TW1*100),gc1=100-gb1,gb2=Math.round(TB2/TW2*100),gc2=100-gb2;
    mkDonut('dt_total_1',gb1,gc1);
    mkDonut('dt_total_2',gb2,gc2);
    ord.forEach(i=>{
      const t1=W1[i][0],t2=W2[i][0];
      const bp1=t1>0?Math.round(W1[i][1]/t1*100):0,cp1=100-bp1;
      const bp2=t2>0?Math.round(W2[i][1]/t2*100):0,cp2=100-bp2;
      mkDonut(`dt_${i}_1`,bp1,cp1);
      mkDonut(`dt_${i}_2`,bp2,cp2);
    });
  },100);
}
</script>
</body>
</html>
