<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>샵인샵 주간보고 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:-apple-system,'Malgun Gothic',sans-serif;padding:12px;}
.inp-panel{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px;margin-bottom:12px;}
.inp-title{font-size:13px;font-weight:700;color:#1a2235;margin-bottom:10px;}
.inp-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
label{font-size:10px;font-weight:600;color:#64748b;}
textarea{border:1px solid #e2e8f0;border-radius:6px;padding:8px;font-size:10px;color:#1a2235;outline:none;width:100%;resize:vertical;font-family:monospace;line-height:1.6;}
textarea:focus{border-color:#4B7BE8;}
.hint{font-size:9.5px;color:#94a3b8;margin-top:4px;line-height:1.6;}
.hint code{background:#f1f5f9;padding:1px 4px;border-radius:3px;color:#475569;}
.run-btn{width:100%;padding:10px;background:#4B7BE8;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px;}
.run-btn:hover{background:#3566d0;}
.err{background:#fff1f1;border:1px solid #fca5a5;border-radius:6px;padding:8px 12px;font-size:11px;color:#dc2626;margin-bottom:10px;display:none;}
.dash{display:none;}
.dash.on{display:block;}
.tab-bar{display:flex;align-items:stretch;border-bottom:2px solid #e2e8f0;background:#fff;border-radius:10px 10px 0 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.tab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:600;color:#8896b0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.on{color:#4B7BE8;border-bottom:2px solid #4B7BE8;background:#f8faff;}
.edit-btn{display:flex;align-items:center;padding:0 14px;font-size:11px;font-weight:600;color:#475569;background:#f1f5f9;border:none;border-left:1px solid #e2e8f0;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.edit-btn:hover{background:#e2e8f0;}
.page{display:none;background:#f0f4f8;padding:14px;border-radius:0 0 10px 10px;}
.page.on{display:block;}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #e8edf5;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.kpi{padding:11px 13px;}
.kl{font-size:11px;color:#8896b0;margin-bottom:3px;}
.kv{font-size:18px;font-weight:700;color:#1a2235;line-height:1.1;}
.ks{font-size:10px;color:#a0aec0;margin-top:3px;}
.page-tit{font-size:13px;font-weight:700;color:#1a2235;margin-bottom:2px;}
.page-sub{font-size:11px;color:#8896b0;margin-bottom:12px;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cc{padding:12px 14px;}
.ct{font-size:12px;font-weight:700;color:#1a2235;margin-bottom:7px;}
.leg{display:flex;gap:10px;font-size:10px;color:#8896b0;margin-bottom:7px;flex-wrap:wrap;}
.lsq{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle;}
.sec{margin-bottom:10px;padding:13px 14px;}
.sec-tit{font-size:12px;font-weight:700;color:#1a2235;margin-bottom:9px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{color:#8896b0;font-weight:600;padding:6px 10px;border-bottom:1px solid #e8edf5;text-align:right;white-space:nowrap;background:#fff;}
thead th:first-child{text-align:left;min-width:90px;}
tbody td{padding:6px 10px;text-align:right;border-bottom:1px solid #f4f6fa;white-space:nowrap;color:#374151;}
tbody td:first-child{text-align:left;color:#1a2235;font-weight:600;}
.total-row td{background:#f0f4f8!important;font-weight:700;color:#1a2235;border-top:1px solid #dde4ef;border-bottom:none;}
.bup{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#fff1f1;color:#dc2626;font-weight:700;}
.bdn{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#eff6ff;color:#2563eb;font-weight:700;}
.hl-grid{display:grid;gap:8px;margin-bottom:10px;}
.hl{border-radius:10px;padding:13px 14px;background:#fff;border:1px solid #e8edf5;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.hl-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.hl-dot{width:10px;height:10px;border-radius:50%;}
.hl-nm{font-size:12px;font-weight:700;color:#1a2235;}
.hl-kpis{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.hl-k{background:#f8fafc;border-radius:6px;padding:6px 8px;}
.hl-kl{font-size:9px;color:#8896b0;margin-bottom:2px;}
.hl-kv{font-size:13px;font-weight:700;color:#1a2235;}
.hl-ks{font-size:9px;margin-top:1px;}
.ad-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.adb{display:flex;flex-direction:column;gap:10px;}
.adb-item{display:flex;flex-direction:column;gap:3px;}
.adb-hd{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;}
.adb-nm{font-weight:600;}
.adb-vals{display:flex;gap:8px;font-size:10px;color:#8896b0;}
.adb-bars{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.adb-lbl{font-size:9px;color:#8896b0;margin-bottom:2px;}
.adb-track{height:7px;background:#f0f4f8;border-radius:4px;overflow:hidden;}
.adb-fill{height:100%;border-radius:4px;}
.report{background:#fff;border-radius:10px;border:1px solid #e8edf5;overflow:hidden;margin-top:10px;}
.rp-hd{background:#1a2235;padding:13px 18px;}
.rp-hd-tit{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;}
.rp-hd-sub{font-size:11px;color:#8896b0;}
.rp-body{padding:16px 18px;}
.sb{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid #f0f4f8;}
.sb:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.sb-nm{font-size:12px;font-weight:700;color:#1a2235;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;}
.tg{background:#dcfce7;color:#15803d;}.tw{background:#fee2e2;color:#b91c1c;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:9px;}
.m{background:#f8fafc;border-radius:6px;padding:6px 9px;}
.ml{font-size:9px;color:#8896b0;margin-bottom:2px;}
.mv{font-size:13px;font-weight:700;color:#1a2235;}
.ms{font-size:9px;color:#8896b0;margin-top:1px;}
.sb-txt{font-size:11.5px;color:#374151;line-height:1.8;border-left:3px solid #e2e8f0;padding-left:12px;}
.sb-txt strong{color:#1a2235;font-weight:700;}
.act{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;background:#fffbeb;color:#92400e;border:1px solid #fde68a;font-weight:600;margin-top:6px;}
</style>
</head>
<body>

<div class="inp-panel" id="inputPanel">
  <div class="inp-title">📊 샵인샵 주간보고 생성기</div>
  <div class="inp-group">
    <label>데이터 붙여넣기 (엑셀에서 전체 복사 → 여기에 붙여넣기)</label>
    <textarea id="tData" rows="22" placeholder="산들그린_영등포점
5월4주차	제로고기찜	비고	제주할멍고기국수	비고	에그폭죽	비고
총매출	478,900		3,651,900		1,127,600
배민매출	404,400		1,967,600		346,000
배민광고비	159,390		483,750		171,110
배민광고사용률	39.41%		24.59%		49.45%
쿠팡매출	74,500		1,684,300		781,600
쿠팡광고비	10,393		238,857		93,474
쿠팡광고사용률	13.95%		14.18%		11.96%
5월5주차	제로고기찜	전주대비	제주할멍고기국수	전주대비	에그폭죽	전주대비
총매출	818,000	171%	4,839,700	133%	1,664,100	148%
배민매출	449,200	111%	2,326,400	118%	643,900	186%
배민광고비	182,070	114%	402,750	83%	210,160	123%
배민광고사용률	40.53%	103%	17.31%	70%	32.64%	66%
쿠팡매출	368,800	495%	2,513,300	149%	1,020,200	131%
쿠팡광고비	37,278	359%	350,202	147%	126,725	136%
쿠팡광고사용률	10.11%	72%	13.93%	98%	12.42%	104%"></textarea>
    <div class="hint">
      첫 행: 매장명(선택) / 다음 행: 전주 헤더(주차명 + 브랜드명 반복) / 이후 7행: 전주 지표 / 그 다음 행: 금주 헤더 / 이후 7행: 금주 지표<br>
      지표 순서(고정): <code>총매출</code> <code>배민매출</code> <code>배민광고비</code> <code>배민광고사용률</code> <code>쿠팡매출</code> <code>쿠팡광고비</code> <code>쿠팡광고사용률</code>
    </div>
  </div>
  <div id="errMsg" class="err"></div>
  <button class="run-btn" onclick="runAnalyze()">📊 보고서 생성</button>
</div>

<div class="dash" id="dash">
  <div class="tab-bar">
    <div class="tab on" onclick="showTab(0)">📊 매출분석</div>
    <div class="tab" onclick="showTab(1)">📋 분석보고용</div>
    <button class="edit-btn" onclick="editMode()">✏ 수정</button>
  </div>
  <div class="page on" id="p0"><div id="b0"></div></div>
  <div class="page" id="p1"><div id="b1"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BC=['#4B7BE8','#E86035','#16a34a','#a855f7','#f59e0b','#06b6d4'];
let chartInst=[],D=null;

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('on',i===n));
}
function editMode(){
  chartInst.forEach(c=>{try{c.destroy();}catch(e){}});
  chartInst=[];
  document.getElementById('inputPanel').style.display='';
  document.getElementById('dash').classList.remove('on');
}
function showErr(msg){const el=document.getElementById('errMsg');el.textContent=msg;el.style.display='block';}
function toNum(v){return parseFloat(String(v).replace(/,/g,'').replace(/%/g,'').trim())||0;}

function parseData(text){
  const lines=text.trim().split('\n').map(l=>l.split('\t'));
  const METRICS=['총매출','배민매출','배민광고비','배민광고사용률','쿠팡매출','쿠팡광고비','쿠팡광고사용률'];
  function isMetric(row){return METRICS.some(m=>String(row[0]||'').includes(m));}

  // 헤더 행(주차 행) 찾기: col[0]에 값 있고 메트릭이 아닌 행
  const headerIdxs=[];
  let storeName='';
  for(let i=0;i<lines.length;i++){
    const v=String(lines[i][0]||'').trim();
    if(!v) continue;
    if(isMetric(lines[i])) continue;
    // 첫 번째 비메트릭 행이 헤더인지 매장명인지 판별
    // 매장명: 탭이 없거나 나머지 셀이 비어있음
    // 헤더: 브랜드명이 옆에 있음
    const hasContent=lines[i].slice(1).some(c=>c.trim());
    if(!hasContent && headerIdxs.length===0){storeName=v; continue;}
    headerIdxs.push(i);
  }
  if(headerIdxs.length<2) return {err:'전주/금주 헤더 행 2개를 찾을 수 없습니다.'};

  const h1idx=headerIdxs[0], h2idx=headerIdxs[1];
  const h1=lines[h1idx];

  // 브랜드명 추출 (홀수 열: 1,3,5…)
  const brands=[];
  for(let c=1;c<h1.length;c+=2){
    const b=(h1[c]||'').trim();
    if(b&&b!=='비고'&&b!=='전주대비') brands.push(b);
  }
  if(brands.length===0) return {err:'브랜드명을 찾을 수 없습니다. 헤더 행에 브랜드명이 있는지 확인해주세요.'};

  const w1L=(h1[0]||'전주').trim();
  const w2L=(lines[h2idx][0]||'금주').trim();

  function extractWeek(startIdx){
    const d={total:[],bm:[],bmAd:[],bmRate:[],cp:[],cpAd:[],cpRate:[]};
    const keys=['total','bm','bmAd','bmRate','cp','cpAd','cpRate'];
    for(let mi=0;mi<7;mi++){
      const row=lines[startIdx+mi]||[];
      brands.forEach((_,bi)=>{d[keys[mi]].push(toNum(row[1+bi*2]));});
    }
    return d;
  }

  const W1=extractWeek(h1idx+1), W2=extractWeek(h2idx+1);
  return {storeName:storeName||'매장',brands,W1,W2,w1L,w2L};
}

function runAnalyze(){
  document.getElementById('errMsg').style.display='none';
  const txt=document.getElementById('tData').value.trim();
  if(!txt){showErr('데이터를 붙여넣어 주세요.');return;}
  const result=parseData(txt);
  if(result.err){showErr(result.err);return;}
  chartInst.forEach(c=>{try{c.destroy();}catch(e){}});
  chartInst=[];
  D=result;
  renderDash();
  document.getElementById('inputPanel').style.display='none';
  document.getElementById('dash').classList.add('on');
  showTab(0);
}

const fm=v=>v>0?Math.round(v/10000).toLocaleString('ko-KR')+'만':'—';
const fma=v=>v>0?(Math.round(v/10000*10)/10)+'만':'—';
const fp=v=>v>=0?`<span class="bup">▲${(v*100).toFixed(1)}%</span>`:`<span class="bdn">▼${(Math.abs(v)*100).toFixed(1)}%</span>`;

function renderDash(){
  const {storeName,brands,W1,W2,w1L,w2L}=D;
  const n=brands.length;
  const T1=W1.total.reduce((s,v)=>s+v,0),T2=W2.total.reduce((s,v)=>s+v,0),tgr=(T2-T1)/T1;
  const bm1=W1.bm.reduce((s,v)=>s+v,0),bm2=W2.bm.reduce((s,v)=>s+v,0);
  const cp1=W1.cp.reduce((s,v)=>s+v,0),cp2=W2.cp.reduce((s,v)=>s+v,0);
  const bmAd1=W1.bmAd.reduce((s,v)=>s+v,0),bmAd2=W2.bmAd.reduce((s,v)=>s+v,0);
  const g=i=>W1.total[i]>0?(W2.total[i]-W1.total[i])/W1.total[i]:0;
  const bmAdRate1=bm1>0?bmAd1/bm1*100:0, bmAdRate2=bm2>0?bmAd2/bm2*100:0;
  const bmAdRateDiff=bmAdRate2-bmAdRate1;
  const upCount=brands.filter((_,i)=>g(i)>=0).length;
  const cols=Math.min(n,3);

  function hlCards(){
    return brands.map((b,i)=>{
      const gi=g(i),col=BC[i%BC.length];
      const bmRd=W2.bmRate[i]-W1.bmRate[i], cpRd=W2.cpRate[i]-W1.cpRate[i];
      return`<div class="hl" style="border-top:3px solid ${col};">
        <div class="hl-hd"><div class="hl-dot" style="background:${col};"></div><div class="hl-nm">${b}</div><span>${fp(gi)}</span></div>
        <div class="hl-kpis">
          <div class="hl-k"><div class="hl-kl">${w1L}</div><div class="hl-kv">${fm(W1.total[i])}</div></div>
          <div class="hl-k"><div class="hl-kl">${w2L}</div><div class="hl-kv" style="color:#dc2626;">${fm(W2.total[i])}</div></div>
          <div class="hl-k"><div class="hl-kl">배민광고율</div><div class="hl-kv" style="color:${bmRd>0?'#dc2626':'#16a34a'};font-size:11px;">${W1.bmRate[i].toFixed(2)}→${W2.bmRate[i].toFixed(2)}%</div><div class="hl-ks" style="color:${bmRd>0?'#dc2626':'#16a34a'};">${bmRd>0?'▲':'▼'}${Math.abs(bmRd).toFixed(2)}%p</div></div>
          <div class="hl-k"><div class="hl-kl">쿠팡광고율</div><div class="hl-kv" style="color:${cpRd>0?'#dc2626':'#16a34a'};font-size:11px;">${W1.cpRate[i].toFixed(2)}→${W2.cpRate[i].toFixed(2)}%</div><div class="hl-ks" style="color:${cpRd>0?'#dc2626':'#16a34a'};">${cpRd>0?'▲':'▼'}${Math.abs(cpRd).toFixed(2)}%p</div></div>
        </div>
      </div>`;
    }).join('');
  }

  function adRateSection(){
    const max=60;
    let h='<div class="ad-grid">';
    ['배민 광고사용률','쿠팡 광고사용률'].forEach((title,ti)=>{
      h+=`<div><div style="font-size:11px;font-weight:700;color:${ti===0?'#4B7BE8':'#E86035'};margin-bottom:10px;">${title}</div><div class="adb">`;
      brands.forEach((b,i)=>{
        const r1=ti===0?W1.bmRate[i]:W1.cpRate[i],r2=ti===0?W2.bmRate[i]:W2.cpRate[i];
        const diff=r2-r1,col=BC[i%BC.length];
        h+=`<div class="adb-item">
          <div class="adb-hd"><span class="adb-nm" style="color:${col};">${b}</span><span style="font-size:10px;font-weight:700;color:${diff>0?'#dc2626':'#16a34a'};">${diff>0?'▲':'▼'}${Math.abs(diff).toFixed(2)}%p</span></div>
          <div class="adb-vals"><span>${w1L}: ${r1.toFixed(2)}%</span><span>${w2L}: <strong style="color:${diff>0?'#dc2626':'#16a34a'};">${r2.toFixed(2)}%</strong></span></div>
          <div class="adb-bars">
            <div><div class="adb-lbl">${w1L}</div><div class="adb-track"><div class="adb-fill" style="width:${Math.min(r1/max*100,100)}%;background:${col}66;"></div></div></div>
            <div><div class="adb-lbl" style="color:${diff>0?'#dc2626':'#16a34a'};">${w2L}</div><div class="adb-track"><div class="adb-fill" style="width:${Math.min(r2/max*100,100)}%;background:${col};"></div></div></div>
          </div>
        </div>`;
      });
      h+='</div></div>';
    });
    return h+'</div>';
  }

  function detailTable(){
    const rows=[
      {l:'총매출',k:'total'},{l:'배민 매출',k:'bm'},{l:'배민 광고비',k:'bmAd'},
      {l:'배민 광고율',k:'bmRate',isR:true},{l:'쿠팡 매출',k:'cp'},
      {l:'쿠팡 광고비',k:'cpAd'},{l:'쿠팡 광고율',k:'cpRate',isR:true}
    ];
    let h='<thead><tr><th>항목</th>';
    brands.forEach((b,i)=>h+=`<th style="color:${BC[i%BC.length]};text-align:center;">${b}<br><small style="font-weight:400;color:#8896b0;">${w1L}→${w2L}</small></th><th></th>`);
    h+='</tr></thead><tbody>';
    rows.forEach(r=>{
      h+=`<tr><td>${r.l}</td>`;
      brands.forEach((_,i)=>{
        if(r.isR){
          const v1=W1[r.k][i],v2=W2[r.k][i],d=v2-v1;
          h+=`<td>${v1.toFixed(2)}% → <strong style="color:${d>0?'#dc2626':'#16a34a'};">${v2.toFixed(2)}%</strong></td><td><span style="font-size:10px;font-weight:700;color:${d>0?'#dc2626':'#16a34a'};">${d>0?'▲':'▼'}${Math.abs(d).toFixed(2)}%p</span></td>`;
        } else {
          const v1=W1[r.k][i],v2=W2[r.k][i],gv=v1>0?(v2-v1)/v1:0;
          h+=`<td>${fm(v1)} → <strong>${fm(v2)}</strong></td><td>${fp(gv)}</td>`;
        }
      });
      h+='</tr>';
    });
    h+='<tr class="total-row"><td>합계</td>';
    brands.forEach((_,i)=>h+=`<td colspan="2" style="color:${BC[i%BC.length]};">${fm(W1.total[i])} → <strong>${fm(W2.total[i])}</strong></td>`);
    return h+'</tr></tbody>';
  }

  function buildMain(sfx){
    return`
    <div class="page-tit">${storeName} 브랜드별 매출 분석</div>
    <div class="page-sub">${w1L} vs ${w2L} · ${brands.join(' · ')}</div>
    <div class="kpis">
      <div class="kpi card" style="border-left:3px solid #16a34a;"><div class="kl">${w2L} 합산 총매출</div><div class="kv">${fm(T2)}</div><div class="ks">${w1L} ${fm(T1)} · <span style="color:#dc2626;font-weight:700;">▲${(tgr*100).toFixed(1)}%</span></div></div>
      <div class="kpi card"><div class="kl">합산 배민광고비</div><div class="kv">${fm(bmAd2)}</div><div class="ks">${w1L} ${fm(bmAd1)} · <span style="${bmAd2<bmAd1?'color:#16a34a':'color:#dc2626'};font-weight:700;">${bmAd2<bmAd1?'▼':'▲'}${(Math.abs((bmAd2-bmAd1)/(bmAd1||1))*100).toFixed(1)}%${bmAd2<bmAd1?' 절감':''}</span></div></div>
      <div class="kpi card"><div class="kl">합산 배민광고율</div><div class="kv" style="font-size:14px;">${bmAdRate1.toFixed(1)}% → <span style="color:${bmAdRateDiff<=0?'#16a34a':'#dc2626'};">${bmAdRate2.toFixed(1)}%</span></div><div class="ks">${bmAdRateDiff<=0?'▼'+Math.abs(bmAdRateDiff).toFixed(1)+'%p 개선':'▲'+bmAdRateDiff.toFixed(1)+'%p 상승'}</div></div>
      <div class="kpi card"><div class="kl">쿠팡 매출 성장</div><div class="kv">${fm(cp2)}</div><div class="ks">${w1L} ${fm(cp1)} · <span style="color:#dc2626;font-weight:700;">${fp((cp2-cp1)/(cp1||1))}</span></div></div>
    </div>
    ${upCount===n?`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#166534;">🎉 <strong>${n}개 브랜드 모두 성장</strong> · 합산 배민광고비 ${bmAd2<bmAd1?'절감하며 매출 증가 · 광고 효율 개선':'증가했으나 매출도 성장'}</div>`:''}
    <div class="hl-grid" style="grid-template-columns:repeat(${cols},1fr);">${hlCards()}</div>
    <div class="cg">
      <div class="cc card">
        <div class="ct">브랜드별 총매출 비교 (만원)</div>
        <div class="leg"><span><span class="lsq" style="background:#ccc;border:1px solid #999;"></span>${w1L}</span>${brands.map((b,i)=>`<span><span class="lsq" style="background:${BC[i%BC.length]};"></span>${b}</span>`).join('')}</div>
        <div style="position:relative;height:150px;"><canvas id="ch1${sfx}"></canvas></div>
      </div>
      <div class="cc card">
        <div class="ct">배민 / 쿠팡이츠 매출 비교 (만원)</div>
        <div class="leg">
          <span><span class="lsq" style="background:#4B7BE844;border:1px solid #4B7BE8;"></span>${w1L}배민</span><span><span class="lsq" style="background:#4B7BE8;"></span>${w2L}배민</span>
          <span><span class="lsq" style="background:#E8603544;border:1px solid #E86035;"></span>${w1L}쿠팡</span><span><span class="lsq" style="background:#E86035;"></span>${w2L}쿠팡</span>
        </div>
        <div style="position:relative;height:150px;"><canvas id="ch2${sfx}"></canvas></div>
      </div>
    </div>
    <div class="card sec" style="margin-bottom:10px;"><div class="sec-tit">광고사용률 비교 (${w1L} → ${w2L} · 파란색=개선)</div>${adRateSection()}</div>
    <div class="card sec"><div class="sec-tit">전체 지표 상세 비교 (${w1L} → ${w2L})</div><div class="tbl-wrap"><table>${detailTable()}</table></div></div>`;
  }

  function buildReport(){
    return`<div class="report">
      <div class="rp-hd"><div class="rp-hd-tit">브랜드별 분석 보고서</div><div class="rp-hd-sub">${storeName} · ${w1L} vs ${w2L} · 대표 보고용</div></div>
      <div class="rp-body">
        <div class="sb">
          <div class="sb-nm">전체 총평 <span class="tag ${tgr>=0?'tg':'tw'}">${tgr>=0?'▲':'▼'}${(Math.abs(tgr)*100).toFixed(1)}% · ${upCount}개 브랜드 성장</span></div>
          <div class="metrics">
            <div class="m"><div class="ml">${w1L} 합산</div><div class="mv">${fm(T1)}</div></div>
            <div class="m"><div class="ml">${w2L} 합산</div><div class="mv" style="color:#dc2626;">${fm(T2)}</div></div>
            <div class="m"><div class="ml">배민광고율</div><div class="mv" style="color:${bmAdRateDiff<=0?'#16a34a':'#dc2626'};">${bmAdRate1.toFixed(1)}→${bmAdRate2.toFixed(1)}%</div><div class="ms">${bmAdRateDiff<=0?'▼'+Math.abs(bmAdRateDiff).toFixed(1)+'%p 개선':'▲'+bmAdRateDiff.toFixed(1)+'%p 상승'}</div></div>
            <div class="m"><div class="ml">쿠팡성장</div><div class="mv" style="color:#dc2626;">▲${((cp2-cp1)/(cp1||1)*100).toFixed(1)}%</div><div class="ms">${fma(cp1)}→${fma(cp2)}</div></div>
          </div>
          <div class="sb-txt"><strong>${upCount}개 브랜드 성장</strong>하며 합산 ${(Math.abs(tgr)*100).toFixed(1)}% ${tgr>=0?'증가':'감소'}했습니다. 배민 광고비를 ${bmAd2<bmAd1?`${(Math.abs((bmAd2-bmAd1)/(bmAd1||1))*100).toFixed(1)}% 절감(${fma(bmAd1)}→${fma(bmAd2)})하면서도 매출을 늘리는 이상적인 패턴`:`${(Math.abs((bmAd2-bmAd1)/(bmAd1||1))*100).toFixed(1)}% 증가(${fma(bmAd1)}→${fma(bmAd2)})하며 매출 성장`}이 나타났습니다. 쿠팡 매출도 ${fma(cp1)}→${fma(cp2)}으로 ${((cp2-cp1)/(cp1||1)*100).toFixed(1)}% 증가했습니다.</div>
        </div>
        ${brands.map((b,i)=>{
          const gi=g(i),col=BC[i%BC.length];
          const bmRd=W2.bmRate[i]-W1.bmRate[i], cpGr=W1.cp[i]>0?(W2.cp[i]-W1.cp[i])/W1.cp[i]:0;
          let sum=bmRd<-5?`배민 광고사용률이 ${W1.bmRate[i].toFixed(2)}%→${W2.bmRate[i].toFixed(2)}%로 <strong>${Math.abs(bmRd).toFixed(2)}%p 대폭 개선</strong>됐습니다.`
            :bmRd>5?`배민 광고사용률이 ${W1.bmRate[i].toFixed(2)}%→${W2.bmRate[i].toFixed(2)}%로 <strong>${bmRd.toFixed(2)}%p 상승</strong>하여 개선이 필요합니다.`
            :`배민 광고사용률 ${W1.bmRate[i].toFixed(2)}%→${W2.bmRate[i].toFixed(2)}%로 안정 유지됐습니다.`;
          sum+=cpGr>0.5?` 쿠팡 매출 ${fm(W1.cp[i])}→${fm(W2.cp[i])}으로 <strong>${(cpGr*100).toFixed(0)}% 폭발 성장</strong>했습니다.`
            :` 쿠팡 매출 ${fm(W1.cp[i])}→${fm(W2.cp[i])}으로 ${cpGr>=0?'성장':'감소'}했습니다.`;
          return`<div class="sb">
            <div class="sb-nm"><span style="color:${col};">${b}</span> <span class="tag ${gi>=0?'tg':'tw'}">${gi>=0?'▲':'▼'}${(Math.abs(gi)*100).toFixed(1)}% · 배민광고율 ${bmRd<=0?'개선':'상승'}</span></div>
            <div class="metrics">
              <div class="m"><div class="ml">${w1L}</div><div class="mv">${fm(W1.total[i])}</div></div>
              <div class="m"><div class="ml">${w2L}</div><div class="mv" style="color:#dc2626;">${fm(W2.total[i])}</div></div>
              <div class="m"><div class="ml">배민광고비</div><div class="mv" style="color:${W2.bmAd[i]<W1.bmAd[i]?'#16a34a':'#dc2626'};font-size:11px;">${fma(W1.bmAd[i])}→${fma(W2.bmAd[i])}</div><div class="ms">${W2.bmAd[i]<W1.bmAd[i]?'▼':'▲'}${(Math.abs((W2.bmAd[i]-W1.bmAd[i])/(W1.bmAd[i]||1))*100).toFixed(0)}%</div></div>
              <div class="m"><div class="ml">배민광고율</div><div class="mv" style="color:${bmRd<=0?'#16a34a':'#dc2626'};font-size:11px;">${W1.bmRate[i].toFixed(2)}→${W2.bmRate[i].toFixed(2)}%</div><div class="ms">${bmRd<=0?'▼':'▲'}${Math.abs(bmRd).toFixed(2)}%p</div></div>
            </div>
            <div class="sb-txt">${w2L} <strong>${fm(W2.total[i])}</strong>으로 전주 대비 <strong>${gi>=0?'+':''}${Math.round((W2.total[i]-W1.total[i])/10000).toLocaleString('ko-KR')}만원 ${gi>=0?'증가':'감소'}</strong>했습니다. ${sum}<br><span class="act">▶ ${bmRd<=0?'현 세팅 유지 및 효율 구조 지속 모니터링':'배민 광고율 개선 및 입찰가 조정 검토'}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('b0').innerHTML=buildMain('A');
  document.getElementById('b1').innerHTML=buildMain('B')+buildReport();

  function initCharts(sfx){
    setTimeout(()=>{
      const {brands,W1,W2}=D;
      const e1=document.getElementById('ch1'+sfx);
      if(!e1||e1._ok)return; e1._ok=true;
      const cols=BC.slice(0,brands.length);
      const tc='#9aaccb',gc='rgba(0,0,0,0.05)';
      const c1=new Chart(e1,{type:'bar',data:{labels:brands,datasets:[
        {label:w1L,data:W1.total.map(v=>+(v/10000).toFixed(0)),backgroundColor:cols.map(c=>c+'44'),borderColor:cols,borderWidth:1.5,barPercentage:0.38,categoryPercentage:0.8},
        {label:w2L,data:W2.total.map(v=>+(v/10000).toFixed(0)),backgroundColor:cols,barPercentage:0.38,categoryPercentage:0.8}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#4a5568',font:{size:10},boxWidth:9}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw.toLocaleString()}만`}}},scales:{x:{ticks:{color:tc,font:{size:9}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'만'},grid:{color:gc}}}}});
      chartInst.push(c1);
      const e2=document.getElementById('ch2'+sfx); e2._ok=true;
      const c2=new Chart(e2,{type:'bar',data:{labels:brands,datasets:[
        {label:`${w1L} 배민`,data:W1.bm.map(v=>+(v/10000).toFixed(0)),backgroundColor:'#4B7BE844',borderColor:'#4B7BE8',borderWidth:1.5,barPercentage:0.25,categoryPercentage:0.9},
        {label:`${w2L} 배민`,data:W2.bm.map(v=>+(v/10000).toFixed(0)),backgroundColor:'#4B7BE8',barPercentage:0.25,categoryPercentage:0.9},
        {label:`${w1L} 쿠팡`,data:W1.cp.map(v=>+(v/10000).toFixed(0)),backgroundColor:'#E8603544',borderColor:'#E86035',borderWidth:1.5,barPercentage:0.25,categoryPercentage:0.9},
        {label:`${w2L} 쿠팡`,data:W2.cp.map(v=>+(v/10000).toFixed(0)),backgroundColor:'#E86035',barPercentage:0.25,categoryPercentage:0.9}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#4a5568',font:{size:9},boxWidth:8}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw.toLocaleString()}만`}}},scales:{x:{ticks:{color:tc,font:{size:9}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9},callback:v=>v+'만'},grid:{color:gc}}}}});
      chartInst.push(c2);
    },150);
  }
  initCharts('A'); initCharts('B');
}
</script>
</body>
</html>
